<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tribe Wars Control Room</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{margin:0;font-family:Arial;background:#9e9e9e;}
.header{text-align:center;font-size:42px;font-weight:900;padding:30px;color:#000;}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:0 40px 20px;gap:10px;flex-wrap:wrap;}
.day-buttons button,.controls button{background:#f2cf53;border:none;border-radius:20px;padding:10px 18px;margin-right:10px;font-weight:700;cursor:pointer;}
.leader-banner{background:#f2cf53;padding:12px 25px;border-radius:25px;font-weight:800;}
.board{display:grid;grid-template-columns:200px repeat(4,1fr);gap:6px;padding:20px 40px;}
.cell{padding:18px;text-align:center;font-weight:700;border:3px solid black;}
.label{background:#bdbdbd;color:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.panthers{background:#f2cf53;}
.eagles{background:#ff5252;}
.bears{background:#7ed957;}
.sharks{background:#5cc4c4;}
.select-box{padding:10px;border-radius:8px;border:2px solid rgba(0,0,0,0.2);font-weight:700;width:90%;}
.tier-display{margin-top:10px;padding:8px;border-radius:8px;background:rgba(0,0,0,0.15);font-size:14px;}
.total-row{background:#9e9e9e;font-size:18px;}
.bonus{margin-top:8px;background:#c7e6e6;border:none;border-radius:20px;padding:6px 10px;cursor:pointer;}
.minus{margin-top:8px;background:#ffd6d6;border:none;border-radius:20px;padding:6px 10px;cursor:pointer;}
.joker{margin-top:6px;background:#222;color:#fff;border:none;border-radius:20px;padding:6px 10px;cursor:pointer;font-size:96%;font-weight:600;}
.joker.active{background:#7b3fe4;}


#presentationView{
  display:none;
  flex-direction:column;
  width:100%;
  min-height:100vh;
  background:#b3b3b3;
  overflow:hidden;
}

.title{
  width:100%;
  text-align:center;
  font-size:clamp(24px,4vw,70px);
  font-weight:900;
  color:#000;
  padding:20px 10px;
}

#arena{
  flex:1;
  width:100%;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:1vw;
  padding:20px;
  overflow:hidden;
}

.team{
  flex:1;
  max-width:24%;
  min-width:80px;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
}

.tribe-name{
  font-size:clamp(12px,2vw,34px);
  font-weight:900;
  margin-bottom:10px;
  text-align:center;
  color:#000;
}

.bar{
  width:100%;
  border:4px solid #000;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100px;
  transition:.4s;
}

.score-box{
  width:100%;
  border:4px solid #000;
  margin-top:10px;
  text-align:center;
  padding:12px 0;
  font-size:clamp(14px,2vw,30px);
  font-weight:900;
  color:#000;
}

.difference{
  margin-top:10px;
  min-height:24px;
  text-align:center;
  font-size:clamp(10px,1.1vw,18px);
  font-weight:800;
  color:#000;
}

img{
  width:clamp(50px,6vw,120px);
  height:clamp(50px,6vw,120px);
  object-fit:contain;
}

.back-btn{
  margin:15px auto;
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:#f2cf53;
  cursor:pointer;
  font-size:clamp(12px,1.2vw,16px);
}

@media(max-width:900px){

  .top-bar{
    flex-direction:column;
  }

  #arena{
    gap:8px;
    padding:10px;
  }

  .team{
    max-width:25%;
  }

}

</style>
</head>

<body>

<div id="judgeView">

  <div class="header">
    TRIBE WARS CONTROL ROOM
  </div>

  <div class="top-bar">

    <div class="day-buttons">
      <button onclick="setDay(1)">DAY 1</button>
      <button onclick="setDay(2)">DAY 2</button>
      <button onclick="setDay(3)">DAY 3</button>
    </div>

    <div class="controls">
      <button onclick="addBattle()">+ ADD BATTLE</button>
      <button onclick="switchView('presentation')">RANKING VIEW</button>
      <button onclick="saveState()">SAVE</button>
      <button onclick="loadState()">LOAD</button>
      <button onclick="confirmClear()">CLEAR</button>
    </div>

    <div class="leader-banner" id="leader"></div>

  </div>

  <div class="board" id="board"></div>

</div>

<div id="presentationView">

  <div class="title">
    LIVE RANKINGS TRIBE WARS
  </div>

  <div style="text-align:center;padding:20px;">
    <button onclick="switchView('judge')"
      style="padding:12px 20px;border:none;border-radius:20px;background:#f2cf53;font-weight:900;cursor:pointer;">
      BACK TO CONTROL ROOM
    </button>
  </div>

<div id="arena"></div>

</div>

<script>

const tribes=["panthers","eagles","bears","sharks"];
let presentationWindow=null;

const battles={
1:["TRIBE CHANT","WORDS TO WORSHIP","FIND YOUR TRIBE"],
2:["UNSCRAMBLE","BIN THE TRIBE","ENVOY"],
3:["KINGDOM CLASH","CHAOS ROUND","SLIP N' SLIDE"]
};

const tierOptions=[
{v:0,l:"SELECT TIER"},
{v:100,l:"BRONZE"},
{v:250,l:"SILVER"},
{v:350,l:"GOLD"},
{v:500,l:"PLATINUM"},
{v:700,l:"DIAMOND"}
];

let currentView="judge";

let day=1;
let scores={},bonus={},selectedTier={},joker={},lockedBattles={};

function init(){

 for(let d=1;d<=3;d++){

  scores[d]={};
  bonus[d]={panthers:0,eagles:0,bears:0,sharks:0};
  selectedTier[d]={};
  joker[d]={};
  lockedBattles[d]={};

  battles[d].forEach(b=>{

   scores[d][b]={panthers:0,eagles:0,bears:0,sharks:0};

   selectedTier[d][b]={
    panthers:"",
    eagles:"",
    bears:"",
    sharks:""
   };

   joker[d][b]={
    panthers:false,
    eagles:false,
    bears:false,
    sharks:false
   };

   lockedBattles[d][b]=false;

  });

 }

}

function switchView(view){

 currentView=view;

 document.getElementById("judgeView").style.display=
 view==="judge"?"block":"none";

 document.getElementById("presentationView").style.display=
 view==="presentation"?"flex":"none";

 if(view==="presentation"){
  updatePresentation(getOverallTotals());
 }

}

function toggleLock(b){
 lockedBattles[day][b]=!lockedBattles[day][b];
 render();
}

function addBattle(){

 let name=prompt("Enter battle name:");

 if(!name)return;

 name=name.toUpperCase();

 battles[day].push(name);

 scores[day][name]={panthers:0,eagles:0,bears:0,sharks:0};

 selectedTier[day][name]={
  panthers:"",
  eagles:"",
  bears:"",
  sharks:""
 };

 joker[day][name]={
  panthers:false,
  eagles:false,
  bears:false,
  sharks:false
 };

 lockedBattles[day][name]=false;

 render();

}

function editBattle(oldName){
 let newName=prompt("Edit battle name:",oldName);
 if(!newName)return;
 newName=newName.toUpperCase();
 let i=battles[day].indexOf(oldName);
 battles[day][i]=newName;
 scores[day][newName]=scores[day][oldName];
 selectedTier[day][newName]=selectedTier[day][oldName];
 joker[day][newName]=joker[day][oldName];
 lockedBattles[day][newName]=lockedBattles[day][oldName];
 delete scores[day][oldName];
 delete selectedTier[day][oldName];
 delete joker[day][oldName];
 delete lockedBattles[day][oldName];
 autoSave();render();
}

function deleteBattle(name){
 if(!confirm("Delete this battle?"))return;
 battles[day]=battles[day].filter(b=>b!==name);
 delete scores[day][name];
 delete selectedTier[day][name];
 delete joker[day][name];
 delete lockedBattles[day][name];
 autoSave();render();
}

function setDay(d){
 day=d;
 render();
}

function setScore(b,t,val,label){

 if(lockedBattles[day][b])return;

 scores[day][b][t]=Number(val);

 selectedTier[day][b][t]=label;

 render();

}

function addBonus(t){
 bonus[day][t]+=50;
 render();
}

function subtractBonus(t){
 bonus[day][t]-=50;
 render();
}

function toggleJoker(b,t){

 if(lockedBattles[day][b])return;

 joker[day][b][t]=!joker[day][b][t];

 render();

}

function getTotals(selectedDay=day){

 let totals={
  panthers:0,
  eagles:0,
  bears:0,
  sharks:0
 };

 battles[selectedDay].forEach(b=>{

  tribes.forEach(t=>{

   let base=scores[selectedDay][b][t];

   if(joker[selectedDay][b][t]&&base===500){
    base+=500;
   }

   totals[t]+=base;

  });

 });

 tribes.forEach(t=>{
  totals[t]+=bonus[selectedDay][t];
 });

 return totals;

}

function getOverallTotals(){

 let totals={
  panthers:0,
  eagles:0,
  bears:0,
  sharks:0
 };

 for(let d=1;d<=3;d++){

  let dayTotals=getTotals(d);

  tribes.forEach(t=>{
   totals[t]+=dayTotals[t];
  });

 }

 return totals;

}

function render(){

 let html="";

 html+=`<div class='cell label'>DAY ${day}</div>`;

 tribes.forEach(t=>{

  html+=`
  <div class='cell ${t}'>

    ${t.toUpperCase()}<br>

    <button class='bonus'
      onclick="addBonus('${t}')">
      +50
    </button>

    <button class='minus'
      onclick="subtractBonus('${t}')">
      -50
    </button>

  </div>
  `;

 });

  battles[day].forEach(b=>{
  let locked=lockedBattles[day][b];
  html+=`<div class='cell label'>
    <div>${b}</div>
    <div style="margin-top:8px;display:flex;gap:6px;">
      <button onclick="editBattle('${b}')">✏️</button>
      <button onclick="deleteBattle('${b}')">🗑️</button>
      <button onclick="toggleLock('${b}')">${locked?'🔒':'🔓'}</button>
    </div>
  </div>`;

  tribes.forEach(t=>{
    let jActive=joker[day][b][t]?'active':'';
    html+=`<div class='cell ${t}'>
      <select class='select-box' ${locked?"disabled":""} onchange="setScore('${b}','${t}',this.value,this.options[this.selectedIndex].text)">
        ${tierOptions.map(o=>`<option value='${o.v}' ${selectedTier[day][b][t]===o.l?'selected':''}>${o.l}</option>`).join('')}
      </select>
      <div class='tier-display'>${selectedTier[day][b][t]||""}</div>
      <button class='joker ${jActive}' onclick="toggleJoker('${b}','${t}')">Joker</button>
    </div>`;
  });
 });

 let totals=getTotals();

 html+=`<div class='cell label total-row'>TOTAL</div>`;

 tribes.forEach(t=>{
  html+=`<div class='cell total-row'>${totals[t]}</div>`;
 });

 document.getElementById("board").innerHTML=html;

 updateLeader(totals);

 updatePresentation(getOverallTotals());

}

function updateLeader(totals){

 let max=Math.max(...Object.values(totals));

 if(max===0){
  document.getElementById("leader").innerText="";
  return;
 }

 let leaders=Object.keys(totals)
 .filter(t=>totals[t]===max);

 document.getElementById("leader").innerText=
 leaders.length===1
 ? leaders[0].toUpperCase()+" IS LEADING"
 : leaders.join(" & ").toUpperCase()+" ARE TIED";

}

function updatePresentation(totals){

 let container=document.getElementById("arena");

 if(!container)return;

 const tribeImages={
  panthers:"Panther.png",
  eagles:"Eagle.png",
  bears:"Bear.png",
  sharks:"Shark.png"
 };

 let sorted=[...tribes]
 .sort((a,b)=>totals[b]-totals[a]);

 let max=Math.max(...Object.values(totals),1);

 function height(score){
  return ((score/max)*320)+120;
 }

 let html="";

 sorted.forEach((tribe,index)=>{

  let difference=
  index===0
  ?0
  :totals[sorted[index-1]]-totals[tribe];

  html+=`

  <div class='team'>

    <div class='tribe-name'>
      ${tribe.toUpperCase()}
    </div>

    <div
      class='bar ${tribe}'
      style='height:${height(totals[tribe])}px;'
    >
      <img src='${tribeImages[tribe]}' />
    </div>

    <div class='score-box ${tribe}'>
      ${totals[tribe]}
    </div>

    <div class='difference'>
      ${
        totals[tribe]===0
        ?''
        :index===0
        ?'LEADING'
        :'+'+difference+' TO CATCH UP'
      }
    </div>

  </div>

  `;

 });

 container.innerHTML=html;

}

function autoSave(){

 localStorage.setItem(
 "tribeWarsData",

 JSON.stringify({
  scores,
  bonus,
  selectedTier,
  joker,
  day,
  battles,
  lockedBattles
 })

 );

}

function saveState(){
 autoSave();
}

function loadState(){

 let d=JSON.parse(
 localStorage.getItem("tribeWarsData")
 );

 if(!d)return;

 scores=d.scores;
 bonus=d.bonus;
 selectedTier=d.selectedTier;
 joker=d.joker;
 day=d.day;

 Object.assign(battles,d.battles||{});

 lockedBattles=d.lockedBattles||lockedBattles;

 render();

}

function confirmClear(){

 if(confirm("Clear all data?")){

  localStorage.removeItem("tribeWarsData");

  init();

  render();

 }

}

init();

render();

</script>

</body>
</html>
