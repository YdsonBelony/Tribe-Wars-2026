<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tribe Wars Control Room</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  width:100%;
  min-height:100%;
  overflow-x:hidden;
  font-family:Arial,sans-serif;
  background:#9e9e9e;
  color:#000;
}

body{
  display:flex;
  flex-direction:column;
}

button,
select{
  color:#000;
  font-weight:800;
  font-family:Arial,sans-serif;
}

.header{
  width:100%;
  text-align:center;
  font-size:clamp(24px,4vw,48px);
  font-weight:900;
  padding:20px 10px;
  color:#000;
}

.top-bar{
  width:100%;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:12px;
  padding:10px;
}

.day-buttons,
.controls{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.day-buttons button,
.controls button{
  background:#f2cf53;
  border:none;
  border-radius:20px;
  padding:10px 18px;
  cursor:pointer;
  font-size:clamp(12px,1.5vw,16px);
}

.leader-banner{
  background:#f2cf53;
  padding:12px 20px;
  border-radius:20px;
  font-size:clamp(12px,1.5vw,18px);
  text-align:center;
  color:#000;
}

.board-wrapper{
  width:100%;
  overflow-x:auto;
  padding:10px;
}

.board{
  width:100%;
  min-width:850px;
  display:grid;
  grid-template-columns:minmax(160px,220px) repeat(4,minmax(180px,1fr));
  gap:6px;
}

.cell{
  border:3px solid #000;
  padding:14px;
  text-align:center;
  font-size:clamp(12px,1.2vw,18px);
  font-weight:800;
  color:#000;
}

.label{
  background:#c9c9c9;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.panthers{background:#f2d85b;}
.eagles{background:#ff5757;}
.bears{background:#7ed957;}
.sharks{background:#60d2d8;}

.select-box{
  width:100%;
  max-width:180px;
  padding:10px;
  border-radius:10px;
  border:none;
  font-size:clamp(12px,1vw,16px);
  background:#fff;
}

.tier-display{
  margin-top:10px;
  padding:8px;
  border-radius:10px;
  background:rgba(255,255,255,.4);
  color:#000;
}

.bonus,
.minus,
.joker{
  margin-top:8px;
  border:none;
  border-radius:20px;
  padding:8px 12px;
  cursor:pointer;
  font-size:clamp(11px,1vw,15px);
}

.bonus{
  background:#d8ffff;
}

.minus{
  background:#ffe0e0;
}

.joker{
  background:#222;
  color:#fff;
}

.joker.active{
  background:#7b3fe4;
  color:#fff;
}

.total-row{
  font-size:clamp(14px,1.5vw,22px);
  font-weight:900;
}

#presentationView{
  display:none;
  flex-direction:column;
  width:100%;
  min-height:100vh;
  background:#b3b3b3;
  overflow:hidden;
}

.title{
  width:100%;
  text-align:center;
  font-size:clamp(24px,4vw,70px);
  font-weight:900;
  color:#000;
  padding:20px 10px;
}

#arena{
  flex:1;
  width:100%;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:1vw;
  padding:20px;
  overflow:hidden;
}

.team{
  flex:1;
  max-width:24%;
  min-width:80px;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
}

.tribe-name{
  font-size:clamp(12px,2vw,34px);
  font-weight:900;
  margin-bottom:10px;
  text-align:center;
  color:#000;
}

.bar{
  width:100%;
  border:4px solid #000;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100px;
  transition:.4s;
}

.score-box{
  width:100%;
  border:4px solid #000;
  margin-top:10px;
  text-align:center;
  padding:12px 0;
  font-size:clamp(14px,2vw,30px);
  font-weight:900;
  color:#000;
}

.difference{
  margin-top:10px;
  min-height:24px;
  text-align:center;
  font-size:clamp(10px,1.1vw,18px);
  font-weight:800;
  color:#000;
}

img{
  width:clamp(50px,6vw,120px);
  height:clamp(50px,6vw,120px);
  object-fit:contain;
}

.back-btn{
  margin:15px auto;
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:#f2cf53;
  cursor:pointer;
  font-size:clamp(12px,1.2vw,16px);
}

@media(max-width:900px){

  .top-bar{
    flex-direction:column;
  }

  #arena{
    gap:8px;
    padding:10px;
  }

  .team{
    max-width:25%;
  }

}

</style>
</head>

<body>

<div id="judgeView">

  <div class="header">
    TRIBE WARS CONTROL ROOM
  </div>

  <div class="top-bar">

    <div class="day-buttons">
      <button onclick="setDay(1)">DAY 1</button>
      <button onclick="setDay(2)">DAY 2</button>
      <button onclick="setDay(3)">DAY 3</button>
    </div>

    <div class="controls">
      <button onclick="addBattle()">+ ADD BATTLE</button>
      <button onclick="switchView('presentation')">RANKING VIEW</button>
      <button onclick="saveState()">SAVE</button>
      <button onclick="loadState()">LOAD</button>
      <button onclick="confirmClear()">CLEAR</button>
    </div>

    <div class="leader-banner" id="leader"></div>

  </div>

  <div class="board-wrapper">
    <div class="board" id="board"></div>
  </div>

</div>

<div id="presentationView">

  <div class="title">
    LIVE RANKINGS TRIBE WARS
  </div>

  <button class="back-btn" onclick="switchView('judge')">
    BACK TO CONTROL ROOM
  </button>

  <div id="arena"></div>

</div>

<script>

const tribes=["panthers","eagles","bears","sharks"];

const battles={
1:["TRIBE CHANT","WORDS TO WORSHIP","FIND YOUR TRIBE"],
2:["UNSCRAMBLE","BIN THE TRIBE","ENVOY"],
3:["KINGDOM CLASH","CHAOS ROUND","SLIP N' SLIDE"]
};

const tierOptions=[
{v:0,l:"SELECT TIER"},
{v:100,l:"BRONZE"},
{v:250,l:"SILVER"},
{v:350,l:"GOLD"},
{v:500,l:"PLATINUM"},
{v:700,l:"DIAMOND"}
];

let day=1;

let scores={},bonus={},selectedTier={},joker={},lockedBattles={};

function init(){

 for(let d=1;d<=3;d++){

  scores[d]={};
  bonus[d]={panthers:0,eagles:0,bears:0,sharks:0};
  selectedTier[d]={};
  joker[d]={};
  lockedBattles[d]={};

  battles[d].forEach(b=>{

   scores[d][b]={panthers:0,eagles:0,bears:0,sharks:0};

   selectedTier[d][b]={
    panthers:"",
    eagles:"",
    bears:"",
    sharks:""
   };

   joker[d][b]={
    panthers:false,
    eagles:false,
    bears:false,
    sharks:false
   };

   lockedBattles[d][b]=false;

  });

 }

}

function switchView(view){

 document.getElementById("judgeView").style.display=
 view==="judge"?"block":"none";

 document.getElementById("presentationView").style.display=
 view==="presentation"?"flex":"none";

 if(view==="presentation"){
  updatePresentation(getOverallTotals());
 }

}

function setDay(d){
 day=d;
 render();
}

function addBattle(){

 let name=prompt("Enter battle name");

 if(!name)return;

 name=name.toUpperCase();

 battles[day].push(name);

 scores[day][name]={panthers:0,eagles:0,bears:0,sharks:0};

 selectedTier[day][name]={
  panthers:"",
  eagles:"",
  bears:"",
  sharks:""
 };

 joker[day][name]={
  panthers:false,
  eagles:false,
  bears:false,
  sharks:false
 };

 lockedBattles[day][name]=false;

 render();

}

function toggleLock(b){

 lockedBattles[day][b]=!lockedBattles[day][b];

 render();

}

function setScore(b,t,val,label){

 if(lockedBattles[day][b])return;

 scores[day][b][t]=Number(val);

 selectedTier[day][b][t]=label;

 render();

}

function addBonus(t){

 bonus[day][t]+=50;

 render();

}

function subtractBonus(t){

 bonus[day][t]-=50;

 render();

}

function toggleJoker(b,t){

 joker[day][b][t]=!joker[day][b][t];

 render();

}

function getTotals(selectedDay=day){

 let totals={
  panthers:0,
  eagles:0,
  bears:0,
  sharks:0
 };

 battles[selectedDay].forEach(b=>{

  tribes.forEach(t=>{

   let base=scores[selectedDay][b][t];

   if(joker[selectedDay][b][t]&&base===500){
    base+=500;
   }

   totals[t]+=base;

  });

 });

 tribes.forEach(t=>{
  totals[t]+=bonus[selectedDay][t];
 });

 return totals;

}

function getOverallTotals(){

 let totals={
  panthers:0,
  eagles:0,
  bears:0,
  sharks:0
 };

 for(let d=1;d<=3;d++){

  let dayTotals=getTotals(d);

  tribes.forEach(t=>{
   totals[t]+=dayTotals[t];
  });

 }

 return totals;

}

function render(){

 let html="";

 html+=`<div class='cell label'>DAY ${day}</div>`;

 tribes.forEach(t=>{

  html+=`
  <div class='cell ${t}'>

    ${t.toUpperCase()}<br>

    <button class='bonus'
      onclick="addBonus('${t}')">
      +50
    </button>

    <button class='minus'
      onclick="subtractBonus('${t}')">
      -50
    </button>

  </div>
  `;

 });

 battles[day].forEach(b=>{

  let locked=lockedBattles[day][b];

  html+=`
  <div class='cell label'>

    <div>${b}</div>

    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center;">

      <button onclick="toggleLock('${b}')">
        ${locked?'🔒':'🔓'}
      </button>

    </div>

  </div>
  `;

  tribes.forEach(t=>{

   let active=joker[day][b][t]?"active":"";

   html+=`
   <div class='cell ${t}'>

    <select
      class='select-box'
      onchange="setScore('${b}','${t}',this.value,this.options[this.selectedIndex].text)"
    >

    ${tierOptions.map(o=>`
      <option
        value="${o.v}"
        ${selectedTier[day][b][t]===o.l?"selected":""}
      >
        ${o.l}
      </option>
    `).join("")}

    </select>

    <div class='tier-display'>
      ${selectedTier[day][b][t]}
    </div>

    <button
      class='joker ${active}'
      onclick="toggleJoker('${b}','${t}')"
    >
      Joker
    </button>

   </div>
   `;

  });

 });

 let totals=getTotals();

 html+=`<div class='cell label total-row'>TOTAL</div>`;

 tribes.forEach(t=>{
  html+=`<div class='cell total-row'>${totals[t]}</div>`;
 });

 document.getElementById("board").innerHTML=html;

 updateLeader(totals);

 updatePresentation(getOverallTotals());

}

function updateLeader(totals){

 let max=Math.max(...Object.values(totals));

 if(max===0){
  document.getElementById("leader").innerText="";
  return;
 }

 let leaders=Object.keys(totals)
 .filter(t=>totals[t]===max);

 document.getElementById("leader").innerText=
 leaders.length===1
 ?leaders[0].toUpperCase()+" IS LEADING"
 :leaders.join(" & ").toUpperCase()+" ARE TIED";

}

function updatePresentation(totals){

 let container=document.getElementById("arena");

 let sorted=[...tribes]
 .sort((a,b)=>totals[b]-totals[a]);

 let max=Math.max(...Object.values(totals),1);

 function height(score){
  return ((score/max)*320)+120;
 }

 const tribeImages={
  panthers:"Panther.png",
  eagles:"Eagle.png",
  bears:"Bear.png",
  sharks:"Shark.png"
 };

 let html="";

 sorted.forEach((tribe,index)=>{

  let difference=
  index===0
  ?0
  :totals[sorted[index-1]]-totals[tribe];

  html+=`

  <div class="team">

    <div class="tribe-name">
      ${tribe.toUpperCase()}
    </div>

    <div
      class="bar ${tribe}"
      style="height:${height(totals[tribe])}px;"
    >
      <img src="${tribeImages[tribe]}">
    </div>

    <div class="score-box ${tribe}">
      ${totals[tribe]}
    </div>

    <div class="difference">
      ${
        totals[tribe]===0
        ?''
        :index===0
        ?'LEADING'
        :'+'+difference+' TO CATCH UP'
      }
    </div>

  </div>

  `;

 });

 container.innerHTML=html;

}

function autoSave(){

 localStorage.setItem(
 "tribeWarsData",
 JSON.stringify({
  scores,
  bonus,
  selectedTier,
  joker,
  day,
  battles,
  lockedBattles
 }));

}

function saveState(){
 autoSave();
}

function loadState(){

 let d=JSON.parse(localStorage.getItem("tribeWarsData"));

 if(!d)return;

 scores=d.scores;
 bonus=d.bonus;
 selectedTier=d.selectedTier;
 joker=d.joker;
 day=d.day;

 Object.assign(battles,d.battles||{});

 lockedBattles=d.lockedBattles||lockedBattles;

 render();

}

function confirmClear(){

 if(confirm("Clear all data?")){

  localStorage.removeItem("tribeWarsData");

  init();

  render();

 }

}

init();

render();

</script>

</body>
</html>
